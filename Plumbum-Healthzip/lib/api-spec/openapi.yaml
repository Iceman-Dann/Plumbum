openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Plumbum API - Lead pipe risk assessment
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: risk
    description: Lead risk assessment
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /risk:
    get:
      operationId: getRisk
      tags: [risk]
      summary: Get lead risk score for an address
      description: Geocodes the given address using the Census Geocoder and returns a deterministic risk score based on the census tract FIPS code
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
          description: Full address string to assess (e.g. "123 Main St, Newark NJ")
      responses:
        "200":
          description: Risk assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskResult"
        "400":
          description: Address is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Address could not be geocoded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /representatives:
    get:
      operationId: getRepresentatives
      tags: [civic]
      summary: Get elected representatives for an address
      description: Calls the Google Civic Information API to return federal and state representatives for a given address. Returns 503 if GOOGLE_CIVIC_API_KEY is not configured.
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
          description: Full address string to look up
      responses:
        "200":
          description: Representatives list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepresentativesResult"
        "400":
          description: Address is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Google Civic API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [risk]
      summary: Get aggregate statistics
      description: Returns headline statistics shown on the landing page
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RiskResult:
      type: object
      required:
        - address
        - score
        - risk_level
        - factors
        - lat
        - lng
        - census_tract
        - geocoded_address
      properties:
        address:
          type: string
          description: The original queried address
        geocoded_address:
          type: string
          description: The address as returned by the Census Geocoder
        score:
          type: integer
          description: Risk score from 0 (low) to 100 (high)
          minimum: 0
          maximum: 100
        risk_level:
          type: string
          description: Human-readable risk level
          enum: [Low, Moderate, High]
        factors:
          type: array
          items:
            type: string
          description: List of risk factors driving the score
        lat:
          type: number
          description: Latitude of the geocoded address
        lng:
          type: number
          description: Longitude of the geocoded address
        census_tract:
          type: string
          description: Census tract FIPS code

    StatsResult:
      type: object
      required:
        - homes_at_risk
        - children_affected
        - datasets_analyzed
        - addresses_checked
      properties:
        homes_at_risk:
          type: string
        children_affected:
          type: string
        datasets_analyzed:
          type: integer
        addresses_checked:
          type: integer

    Representative:
      type: object
      required:
        - name
        - title
        - party
      properties:
        name:
          type: string
        title:
          type: string
        party:
          type: string
        email:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true

    RepresentativesResult:
      type: object
      required:
        - representatives
      properties:
        representatives:
          type: array
          items:
            $ref: "#/components/schemas/Representative"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
